services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.2-alpine
    ports:
      - "8124:8123"
      - "9081:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-backups:/var/backups/clickhouse
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-chatbotx_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-chatbotx}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-nr541Kv59xB4f48bhZOy5wBz}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - chatbotx-network

volumes:
  clickhouse-data:
  clickhouse-backups:

networks:
  chatbotx-network:
    driver: bridge

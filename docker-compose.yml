name: ahachat

include:
  - docker-compose.dev.yml

services:
  builder:
    image: realcodesiman/ahachat-builder:latest
    # build:
    #   context: .
    #   dockerfile: apps/builder/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "3123:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # BullMQ Worker
  worker:
    image: realcodesiman/ahachat-worker:latest
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

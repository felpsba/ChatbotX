name: chatbotx

include:
  - docker-compose.yml

x-service-common: &service-common
  restart: unless-stopped
  env_file:
    - ./.env
  extra_hosts:
    - "host.docker.internal:host-gateway"
    - "chat.bahub.pro:host-gateway"
  networks:
    - chatbotx-network

services:
  builder:
    <<: *service-common
    image: ghcr.io/felpsba/chatbotx-builder:latest
    ports:
      - "3123:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      filesystem:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - RUN_DB_MIGRATE=true
      - RUN_DB_SEED=true

  worker:
    <<: *service-common
    image: ghcr.io/felpsba/chatbotx-worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      filesystem:
        condition: service_healthy

  realtime:
    <<: *service-common
    image: ghcr.io/felpsba/chatbotx-realtime:latest
    ports:
      - "1999:1999"

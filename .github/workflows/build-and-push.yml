name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/felpsba/chatbotx

jobs:
  build-builder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/builder/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-builder:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-builder:cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-builder:cache,mode=max

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-worker:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-worker:cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-worker:cache,mode=max

  build-realtime:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/realtime/docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-realtime:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-realtime:cache
          cache-to: type=registry,ref=${{ env.IMAGE_PREFIX }}-realtime:cache,mode=max

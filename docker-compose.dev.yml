name: chatbotx

include:
  - docker-compose.yml

x-service-common: &service-common
  platform: linux/amd64
  restart: unless-stopped
  env_file:
    - ./.env.dev
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - chatbotx-network

x-worker-common: &worker-common
  <<: *service-common
  build:
    context: .
    dockerfile: apps/worker/docker/Dockerfile

services:
  builder:
    <<: *service-common
    build:
      context: .
      dockerfile: apps/builder/docker/Dockerfile
    environment:
      - HOSTNAME=0.0.0.0
    ports:
      - "3123:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      virtual.host: "virtual-builder.example.com"
      virtual.port: "3000"
      virtual.tls-email: "admin@example.com"

  # BullMQ Worker
  worker:
    <<: *worker-common
    # image: realcodesiman/chatbotx-worker:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

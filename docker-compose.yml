name: ahachat

include:
  - docker-compose.dev.yml

services:
  builder:
    build:
      context: .
      dockerfile: apps/builder/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.build
    ports:
      - "3000:3123"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # BullMQ Worker
  worker:
    build:
      context: .
      dockerfile: apps/worker/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
